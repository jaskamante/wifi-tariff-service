spring.application.name=WiFi Tariff Management Service
# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/tariffs
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=changethisinprod
# NOTE: Use environment variables in production, e.g.: ${DB_PASSWORD}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (for viewing data)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Enable method-level validation
spring.validation.enabled=true

# SpringDoc/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.show-actuator=false

# Disable problematic features if causing issues
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

#default port
server.port=8081