spring.application.name=WiFi Tariff Management Service
# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/tariffs
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=changethisinprod

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for viewing data)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Enable method-level validation
spring.validation.enabled=true